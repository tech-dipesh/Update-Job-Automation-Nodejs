name:  India Job Scraper — Every 3 Hours

on:
  schedule:
    # Runs every 3 hours (UTC) → IST times (UTC+5:30):
    # 00:00 UTC = 05:30 IST | 03:00 UTC = 08:30 IST
    # 06:00 UTC = 11:30 IST | 09:00 UTC = 14:30 IST
    # 12:00 UTC = 17:30 IST | 15:00 UTC = 20:30 IST
    # 18:00 UTC = 23:30 IST | 21:00 UTC = 02:30 IST
    - cron: "0 0 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — scrape but do NOT send email"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      company:
        description: "Scrape only this company name (leave blank for all)"
        required: false
        default: ""
      reset:
        description: "Reset seen_jobs.json before running (re-alerts everything)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  PNPM_VERSION: "9"

jobs:
  scrape:
    name: Scrape & Email Alert
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup pnpm ────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      # ── 3. Setup Node.js 24 ──────────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      # ── 4. Get pnpm store path ───────────────────────────────────
      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      # ── 5. Cache pnpm store ──────────────────────────────────────
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      # ── 6. Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # ── 7. Install Chromium for Puppeteer ────────────────────────
      - name: Install Chromium for Puppeteer
        run: |
          rm -rf /home/runner/.cache/puppeteer
          pnpm exec puppeteer browsers install chrome
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            --no-install-recommends

      # ── 8. Restore seen_jobs.json ────────────────────────────────
      - name: Restore seen_jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            seen-jobs-${{ github.ref_name }}-

      # ── 9. Write .env from GitHub Secrets ────────────────────────
      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
          DELAY_MIN=1.5
          DELAY_MAX=4
          REQUEST_TIMEOUT=20000
          PUPPETEER_TIMEOUT=30000
          COMPANIES_FILE=india_tech_companies.json
          SEEN_JOBS_FILE=seen_jobs.json
          LOG_LEVEL=INFO
          ENVEOF

      # ── 10. Reset seen_jobs if requested ─────────────────────────
      - name: Reset seen_jobs.json
        if: ${{ github.event.inputs.reset == 'true' }}
        run: node scraper.js --reset

      # ── 11. Run scraper ──────────────────────────────────────────
      - name: Run scraper
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.company }}" ]; then
            ARGS="$ARGS --company '${{ github.event.inputs.company }}'"
          fi
          node scraper.js $ARGS

      # ── 12. Commit seen_jobs.json back to repo ───────────────────
      - name: Commit seen_jobs.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add seen_jobs.json 2>/dev/null || true
          git add scraper.log   2>/dev/null || true

          if git diff --staged --quiet; then
            echo "✅  Nothing changed — no commit needed."
          else
            git commit -m "chore: update seen_jobs [$(date '+%d %b %Y %H:%M UTC')] [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 13. Upload run artifacts ─────────────────────────────────
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-run-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            seen_jobs.json
            scraper.log
          retention-days: 14

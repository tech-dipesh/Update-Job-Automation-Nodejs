name: 🚀 India Job Scraper — Every 3 Hours

on:
  schedule:
    # Every 3 hours UTC → IST (UTC+5:30):
    # 00:00=05:30 | 03:00=08:30 | 06:00=11:30 | 09:00=14:30
    # 12:00=17:30 | 15:00=20:30 | 18:00=23:30 | 21:00=02:30
    - cron: "0 0 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — scrape but do NOT send email"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      company:
        description: "Scrape only this company (blank = all)"
        required: false
        default: ""
      reset:
        description: "Reset seen_jobs.json before running"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  scrape:
    name: Scrape & Email Alert
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      # ── 1. Checkout (gets latest seen_jobs.json from repo) ──────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup pnpm ───────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # ── 3. Setup Node.js 24 ─────────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      # ── 4. Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Install Chromium for Puppeteer ───────────────────────
      - name: Install Chromium for Puppeteer
        run: |
          rm -rf /home/runner/.cache/puppeteer
          npx puppeteer browsers install chrome
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            --no-install-recommends

      # ── 6. Write .env from GitHub Secrets ───────────────────────
      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
          DELAY_MIN=1.5
          DELAY_MAX=4
          REQUEST_TIMEOUT=20000
          PUPPETEER_TIMEOUT=30000
          COMPANIES_FILE=india_tech_companies.json
          SEEN_JOBS_FILE=seen_jobs.json
          LOG_LEVEL=INFO
          ENVEOF

      # ── 7. Reset seen_jobs if requested ─────────────────────────
      - name: Reset seen_jobs.json
        if: ${{ github.event.inputs.reset == 'true' }}
        run: node scraper.js --reset

      # ── 8. Run scraper ──────────────────────────────────────────
      - name: Run scraper
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.company }}" ]; then
            ARGS="$ARGS --company '${{ github.event.inputs.company }}'"
          fi
          node scraper.js $ARGS

      # ── 9. Commit seen_jobs.json back to repo ───────────────────
      # IMPORTANT: No cache step for seen_jobs.json — we rely purely on
      # git commit/checkout for persistence. A cache restore would
      # overwrite the committed file and break cross-run dedup.
      - name: Commit seen_jobs.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add seen_jobs.json 2>/dev/null || true
          git add scraper.log   2>/dev/null || true

          if git diff --staged --quiet; then
            echo "✅  Nothing changed — no commit needed."
          else
            git commit -m "chore: update seen_jobs [$(date '+%d %b %Y %H:%M UTC')] [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Upload run artifacts ────────────────────────────────
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-run-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            seen_jobs.json
            scraper.log
          retention-days: 14
